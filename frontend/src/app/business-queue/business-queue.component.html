<div class="queue-container">
    <div class="queue-card">
        <h1>🎫 Queue Management</h1>
        <p class="subtitle">Mark customers as served</p>

        <!-- Alert Messages -->
        <div *ngIf="message" class="alert" [ngClass]="messageType">
            <span>{{ message }}</span>
        </div>

        <!-- Served Customer Info -->
        <div *ngIf="servedCustomer" class="customer-info">
            <h3>✅ Customer Served</h3>
            <div class="info-row">
                <span class="label">Token:</span>
                <span class="value">{{ servedCustomer.tokenNumber }}</span>
            </div>
            <div class="info-row">
                <span class="label">Name:</span>
                <span class="value">{{ servedCustomer.userName }}</span>
            </div>
            <div class="info-row">
                <span class="label">Phone:</span>
                <span class="value">{{ servedCustomer.userPhone }}</span>
            </div>
        </div>

        <!-- Input Form -->
        <form (ngSubmit)="markAsServed()" class="queue-form">
            <div class="form-group">
                <label for="uniqueId">🔑 Enter Unique ID</label>
                <input type="text" id="uniqueId" name="uniqueId" [(ngModel)]="uniqueId"
                    placeholder="e.g., a1b2c3d4e5f6g7h8" [disabled]="isLoading">
            </div>

            <button type="submit" [disabled]="isLoading || !uniqueId.trim()" class="submit-btn">
                <span *ngIf="!isLoading">Mark as Served</span>
                <span *ngIf="isLoading" class="btn-loading">
                    <span class="loading-spinner"></span>
                    Processing...
                </span>
            </button>
        </form>

        <div class="help-text">
            <p>💡 <strong>Tip:</strong> Ask the customer for their unique ID to mark them as served.</p>
        </div>
    </div>
</div>
