<div class="container">
    <div class="card">
        <!-- Logo/Brand Area -->
        <div class="text-center mb-4">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
            </div>
            <h1 class="text-gradient">Welcome Back</h1>
            <p class="text-secondary">Sign in to continue to Queue Swap</p>
        </div>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
            <div class="form-group">
                <label for="email">
                    <span class="label-icon">✉️</span>
                    Email Address
                </label>
                <input type="email" id="email" name="email" [(ngModel)]="credentials.email" required email
                    placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">
                    <span class="label-icon">🔒</span>
                    Password
                </label>
                <input type="password" id="password" name="password" [(ngModel)]="credentials.password" required
                    placeholder="Enter your password">
            </div>

            <div *ngIf="error" class="alert alert-error">
                <span class="alert-icon">⚠️</span>
                {{ error }}
            </div>

            <button type="submit" [disabled]="!loginForm.form.valid || loading" class="btn-primary">
                <span *ngIf="!loading">Sign In</span>
                <span *ngIf="loading" class="btn-loading">
                    <span class="loading-spinner"></span>
                    Signing in...
                </span>
            </button>
        </form>

        <div class="divider">
            <span>or</span>
        </div>

        <div class="text-center">
            <p class="small-text">
                Don't have an account?
                <a routerLink="/register" class="link-accent">Create Account</a>
            </p>
        </div>
    </div>
</div>
